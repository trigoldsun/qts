name: CI

on:
  push:
    branches: [ master, release/* ]
  pull_request:
    branches: [ master, release/* ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build biz-settle
      run: cd services/biz-settle && mvn -B clean compile -q

    - name: Test biz-settle
      run: cd services/biz-settle && mvn -B test -q

    - name: Build biz-risk
      run: cd services/biz-risk && mvn -B clean compile -q

    - name: Test biz-risk
      run: cd services/biz-risk && mvn -B test -q
