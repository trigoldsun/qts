name: CI Pipeline

on:
  push:
    branches: [main, develop, 'release/**', 'feature/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '17'
  GO_VERSION: '1.21'
  NODE_VERSION: '18'

jobs:
  # Stage 1: Code Scan
  code-scan:
    name: Code Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run SpotBugs (Java)
        run: |
          find . -name "pom.xml" -execdir mvn spotbugs:spotbugs \; 2>/dev/null || true

      - name: Run golangci-lint
        run: |
          which golangci-lint || curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin
          $(go env GOPATH)/bin/golangci-lint run ./... 2>/dev/null || true

      - name: Run ESLint (Node)
        run: |
          npx eslint services/*/src --ext .ts,.js 2>/dev/null || true

      - name: Upload scan reports
        uses: actions/upload-artifact@v4
        with:
          name: code-scan-reports
          path: target/spotbugsXml.xml
          retention-days: 7

  # Stage 2: Build
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: code-scan
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - product-service
          - order-service
          - payment-service
          - notification-service
          - search-service
          - analytics-service
          - file-service
          - admin-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        if: matrix.service == 'admin-service'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Go
        if: contains(fromJson('["auth-service", "user-service", "product-service", "order-service", "payment-service", "notification-service", "search-service"]'), matrix.service)
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        if: contains(fromJson('["api-gateway", "analytics-service", "file-service"]'), matrix.service)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build Java service
        if: matrix.service == 'admin-service'
        run: mvn package -DskipTests -f services/${{ matrix.service }}/pom.xml

      - name: Build Go service
        if: contains(fromJson('["auth-service", "user-service", "product-service", "order-service", "payment-service", "notification-service", "search-service"]'), matrix.service)
        run: |
          cd services/${{ matrix.service }}
          go build -o bin/${{ matrix.service }} .

      - name: Build Node service
        if: contains(fromJson('["api-gateway", "analytics-service", "file-service"]'), matrix.service)
        run: |
          cd services/${{ matrix.service }}
          npm ci
          npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-build
          path: |
            services/${{ matrix.service }}/target/*.jar
            services/${{ matrix.service }}/bin/*
            services/${{ matrix.service }}/dist/*
          retention-days: 7

  # Stage 3: Unit Test
  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - product-service
          - order-service
          - payment-service
          - notification-service
          - search-service
          - analytics-service
          - file-service
          - admin-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        if: matrix.service == 'admin-service'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Go
        if: contains(fromJson('["auth-service", "user-service", "product-service", "order-service", "payment-service", "notification-service", "search-service"]'), matrix.service)
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        if: contains(fromJson('["api-gateway", "analytics-service", "file-service"]'), matrix.service)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run Java unit tests
        if: matrix.service == 'admin-service'
        run: mvn test -f services/${{ matrix.service }}/pom.xml

      - name: Run Go unit tests
        if: contains(fromJson('["auth-service", "user-service", "product-service", "order-service", "payment-service", "notification-service", "search-service"]'), matrix.service)
        run: go test -v ./... -short

      - name: Run Node unit tests
        if: contains(fromJson('["api-gateway", "analytics-service", "file-service"]'), matrix.service)
        run: |
          cd services/${{ matrix.service }}
          npm test -- --coverage

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.service }}-test-results
          path: |
            services/${{ matrix.service }}/target/surefire-reports
            services/${{ matrix.service }}/coverage
          retention-days: 14

  # Stage 4: Integration Test
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: unit-test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      kafka:
        image: confluentinc/cp-kafka:7.5.0
        env:
          KAFKA_NODE_ID: 1
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9092
          KAFKA_CONTROLLER_MANAGER_REPLICATION_FACTOR: 1
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        ports:
          - 9092:9092
          - 29092:29092
        options: >-
          --health-cmd "kafka-broker-api-versions --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Run Java integration tests
        run: mvn verify -f services/admin-service/pom.xml

  # Stage 5: Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: integration-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Run OWASP dependency check
        run: |
          mvn org.owasp:dependency-check-maven:check -f services/admin-service/pom.xml || true

      - name: Upload security scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'security-scan'

      - name: Upload dependency check report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 30
