# QTS ServiceMonitor Configurations for Prometheus Operator
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-gateway-monitor
  namespace: qts-dev
  labels:
    app: qts
    release: prometheus
spec:
  selector:
    matchLabels:
      app: qts
      component: api-gateway
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - qts-dev
