# QTS Namespaces - Dev/Staging/Prod
---
apiVersion: v1
kind: Namespace
metadata:
  name: qts-dev
  labels:
    environment: development
    team: qts-platform
    component: none
---
apiVersion: v1
kind: Namespace
metadata:
