# QTS Kustomize Overlay for Dev Environment
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: qts-dev

resources:
  - ../../namespace.yaml
  - ../../services/rbac.yaml
  - ../../services/configmaps.yaml
  - ../../services/secrets.yaml
  - ../../services/postgres.yaml
  - ../../services/api-gateway.yaml
  - ../../services/bff-web.yaml
  - ../../services/biz-trade.yaml
  - ../../services/biz-risk.yaml
  - ../../services/market-service.yaml
  - ../../services/auth-service.yaml
  - ../../services/hpa.yaml
  - ../../services/ingress.yaml

commonLabels:
  app: qts
  environment: dev

patchesStrategicMerge:
  - patches/dev-replicas.yaml

images:
  - name: qts/api-gateway
    newTag: latest
  - name: qts/bff-web
    newTag: latest
  - name: qts/biz-trade
    newTag: latest
  - name: qts/biz-risk
    newTag: latest
  - name: qts/market-service
    newTag: latest
  - name: qts/auth-service
    newTag: latest
