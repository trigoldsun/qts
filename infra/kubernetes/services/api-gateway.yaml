# API Gateway Service - Node.js/Express
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: qts-dev
  labels:
    app: qts
    component: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qts
      component: api-gateway
  template:
    metadata:
      labels:
        app: qts
        component: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: qts-sa
      containers:
        - name: api-gateway
          image: qts/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: NODE_ENV
              value: "development"
            - name: PORT
              value: "8080"
            - name: BIZ_TRADE_URL
              value: "http://biz-trade.qts-dev.svc.cluster.local:8080"
            - name: BIZ_RISK_URL
              value: "http://biz-risk.qts-dev.svc.cluster.local:8080"
            - name: BIZ_MARKET_URL
              value: "http://market-service.qts-dev.svc.cluster.local:8080"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service.qts-dev.svc.cluster.local:8080"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: qts-dev
  labels:
    app: qts
    component: api-gateway
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: qts
    component: api-gateway
