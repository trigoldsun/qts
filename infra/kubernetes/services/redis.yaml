# Redis StatefulSet for QTS Trading System
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: qts-dev
  labels:
    app: qts
    component: redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: qts
      component: redis
  template:
    metadata:
      labels:
        app: qts
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          args:
            - --requirepass ""
            - --maxmemory 256mb
            - --maxmemory-policy allkeys-lru
            - --appendonly no
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: qts-dev
  labels:
    app: qts
    component: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app: qts
    component: redis
