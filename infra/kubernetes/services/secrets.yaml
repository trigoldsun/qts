# Docker Registry Secret
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry
  namespace: qts-dev
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: '{"auths":{"your-registry.com":{"username":"","password":"","email":"","auth":""}}}'
