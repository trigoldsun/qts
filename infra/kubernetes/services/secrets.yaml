# QTS Secrets (placeholders - must be updated with real values)
---
apiVersion: v1
kind: Secret
metadata:
  name: qts-secrets
  namespace: qts-dev
type: Opaque
stringData:
  DB_USERNAME: "devuser"
  DB_PASSWORD: "dev_password_change_me"
  JWT_SECRET: "dev_jwt_secret_change_me_in_production"
  REDIS_PASSWORD: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: qts-secrets
  namespace: qts-staging
type: Opaque
stringData:
  DB_USERNAME: "staginguser"
  DB_PASSWORD: "staging_password_change_me"
  JWT_SECRET: "staging_jwt_secret_change_me_in_production"
  REDIS_PASSWORD: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: qts-secrets
