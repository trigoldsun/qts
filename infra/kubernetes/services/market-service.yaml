# MARKET-SERVICE - Java Market Data Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-service
  namespace: qts-dev
  labels:
    app: qts
    component: market-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qts
      component: market-service
  template:
    metadata:
      labels:
        app: qts
        component: market-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: qts-sa
      containers:
        - name: market-service
          image: qts/market-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
            - name: SERVER_PORT
              value: "8080"
            - name: REDIS_HOST
              value: "redis.qts-dev.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: market-service
  namespace: qts-dev
  labels:
    app: qts
    component: market-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: qts
    component: market-service
