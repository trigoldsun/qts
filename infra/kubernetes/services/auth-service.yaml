# AUTH-SERVICE - Go Authentication Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: qts-dev
  labels:
    app: qts
    component: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qts
      component: auth-service
  template:
    metadata:
      labels:
        app: qts
        component: auth-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: qts-sa
      containers:
        - name: auth-service
          image: qts/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: GIN_MODE
              value: "debug"
            - name: SERVER_PORT
              value: "8080"
            - name: DB_HOST
              value: "postgres.qts-dev.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "qts_auth"
            - name: REDIS_HOST
              value: "redis.qts-dev.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: qts-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: qts-dev
  labels:
    app: qts
    component: auth-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: qts
    component: auth-service
