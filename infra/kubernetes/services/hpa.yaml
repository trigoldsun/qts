---
# HPA for BIZ Trade (Core Trading - Higher SLO)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: biz-trade-hpa
  namespace: qts-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: biz-trade
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Pods
      pods:
        metric:
          name: http_request_duration_seconds_p99
        target:
          type: AverageValue
          averageValue: "10m"
