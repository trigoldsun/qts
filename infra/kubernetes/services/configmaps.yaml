# QTS ConfigMaps
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qts-config
  namespace: qts-dev
data:
  APP_ENV: "development"
  LOG_LEVEL: "debug"
  API_TIMEOUT: "30"
  CIRCUIT_BREAKER_ENABLED: "true"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_RPS: "100"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qts-config
  namespace: qts-staging
data:
  APP_ENV: "staging"
  LOG_LEVEL: "info"
  API_TIMEOUT: "30"
  CIRCUIT_BREAKER_ENABLED: "true"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_RPS: "500"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qts-config
  namespace: qts-prod
data:
  APP_ENV: "production"
  LOG_LEVEL: "warning"
  API_TIMEOUT: "60"
  CIRCUIT_BREAKER_ENABLED: "true"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_RPS: "1000"
---
# Database Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
  namespace: qts-dev
data:
  DB_HOST: "postgres.qts-dev.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "qts_trade"
  DB_POOL_SIZE: "10"
  DB_MAX_CONNECTIONS: "50"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
  namespace: qts-staging
data:
  DB_HOST: "postgres.qts-staging.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "qts_trade"
  DB_POOL_SIZE: "20"
  DB_MAX_CONNECTIONS: "100"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
  namespace: qts-prod
data:
  DB_HOST: "postgres.qts-prod.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "qts_trade"
  DB_POOL_SIZE: "50"
  DB_MAX_CONNECTIONS: "200"
---
# Redis Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: qts-dev
data:
  REDIS_HOST: "redis.qts-dev.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_POOL_SIZE: "5"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: qts-staging
data:
  REDIS_HOST: "redis.qts-staging.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_POOL_SIZE: "10"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: qts-prod
data:
  REDIS_HOST: "redis.qts-prod.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_POOL_SIZE: "20"
---
# Market Service Configuration (Spring Boot)
apiVersion: v1
kind: ConfigMap
metadata:
  name: market-service-config
  namespace: qts-dev
data:
  application.yaml: |
    spring:
      application:
        name: market-service
      profiles:
        active: dev
      redis:
        host: ${REDIS_HOST:redis.qts-dev.svc.cluster.local}
        port: ${REDIS_PORT:6379}
        database: 0
        timeout: 5000ms
        lettuce:
          pool:
            max-active: 8
            max-idle: 8
            min-idle: 2
            max-wait: -1ms
      cache:
        type: redis
        redis:
          time-to-live: 60000
    server:
      port: 8080
    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics,prometheus
      endpoint:
        health:
          show-details: always
    market:
      data:
        refresh-interval: 1000
        symbols:
          - BTC-USDT
          - ETH-USDT
          - BNB-USDT
      cache:
        enabled: true
        ttl: 300
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: market-service-config
  namespace: qts-staging
data:
  application.yaml: |
    spring:
      application:
        name: market-service
      profiles:
        active: staging
      redis:
        host: ${REDIS_HOST:redis.qts-staging.svc.cluster.local}
        port: ${REDIS_PORT:6379}
        database: 0
        timeout: 5000ms
        lettuce:
          pool:
            max-active: 16
            max-idle: 8
            min-idle: 4
            max-wait: -1ms
      cache:
        type: redis
        redis:
          time-to-live: 60000
    server:
      port: 8080
    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics,prometheus
      endpoint:
        health:
          show-details: always
    market:
      data:
        refresh-interval: 500
        symbols:
          - BTC-USDT
          - ETH-USDT
          - BNB-USDT
          - SOL-USDT
      cache:
        enabled: true
        ttl: 120
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: market-service-config
  namespace: qts-prod
data:
  application.yaml: |
    spring:
      application:
        name: market-service
      profiles:
        active: prod
      redis:
        host: ${REDIS_HOST:redis.qts-prod.svc.cluster.local}
        port: ${REDIS_PORT:6379}
        database: 0
        timeout: 5000ms
        lettuce:
          pool:
            max-active: 32
            max-idle: 16
            min-idle: 8
            max-wait: -1ms
      cache:
        type: redis
        redis:
          time-to-live: 30000
    server:
      port: 8080
    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics,prometheus
      endpoint:
        health:
          show-details: always
    market:
      data:
        refresh-interval: 200
        symbols:
          - BTC-USDT
          - ETH-USDT
          - BNB-USDT
          - SOL-USDT
          - ADA-USDT
          - DOT-USDT
      cache:
        enabled: true
        ttl: 60
