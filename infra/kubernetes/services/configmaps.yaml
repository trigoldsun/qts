# QTS ConfigMaps
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qts-config
  namespace: qts-dev
data:
  APP_ENV: "development"
  LOG_LEVEL: "debug"
  API_TIMEOUT: "30"
  CIRCUIT_BREAKER_ENABLED: "true"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_RPS: "100"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qts-config
  namespace: qts-staging
data:
  APP_ENV: "staging"
  LOG_LEVEL: "info"
  API_TIMEOUT: "30"
  CIRCUIT_BREAKER_ENABLED: "true"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_RPS: "500"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qts-config
  namespace: qts-prod
data:
  APP_ENV: "production"
  LOG_LEVEL: "warning"
  API_TIMEOUT: "60"
  CIRCUIT_BREAKER_ENABLED: "true"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_RPS: "1000"
---
# Database Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
  namespace: qts-dev
data:
  DB_HOST: "postgres.qts-dev.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "qts_trade"
  DB_POOL_SIZE: "10"
  DB_MAX_CONNECTIONS: "50"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
  namespace: qts-staging
data:
  DB_HOST: "postgres.qts-staging.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "qts_trade"
  DB_POOL_SIZE: "20"
  DB_MAX_CONNECTIONS: "100"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
  namespace: qts-prod
data:
  DB_HOST: "postgres.qts-prod.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "qts_trade"
  DB_POOL_SIZE: "50"
  DB_MAX_CONNECTIONS: "200"
---
# Redis Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: qts-dev
data:
  REDIS_HOST: "redis.qts-dev.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_POOL_SIZE: "5"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: qts-staging
data:
  REDIS_HOST: "redis.qts-staging.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_POOL_SIZE: "10"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: qts-prod
data:
  REDIS_HOST: "redis.qts-prod.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_POOL_SIZE: "20"
