# BIZ-RISK Service - Java/Spring Boot Risk Engine
apiVersion: apps/v1
kind: Deployment
metadata:
  name: biz-risk
  namespace: qts-dev
  labels:
    app: qts
    component: biz-risk
spec:
  replicas: 3
  selector:
    matchLabels:
      app: qts
      component: biz-risk
  template:
    metadata:
      labels:
        app: qts
        component: biz-risk
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: qts-sa
      containers:
        - name: biz-risk
          image: qts/biz-risk:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9091
              name: management
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
            - name: SERVER_PORT
              value: "8080"
            - name: DB_HOST
              value: "postgres.qts-dev.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "qts_risk"
            - name: REDIS_HOST
              value: "redis.qts-dev.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: BIZ_TRADE_URL
              value: "http://biz-trade.qts-dev.svc.cluster.local:8080"
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: biz-risk
  namespace: qts-dev
  labels:
    app: qts
    component: biz-risk
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 9091
      targetPort: 9091
      protocol: TCP
      name: management
  selector:
    app: qts
    component: biz-risk
