# BFF Web Service - Node.js/Express Web Backend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff-web
  namespace: qts-dev
  labels:
    app: qts
    component: bff-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qts
      component: bff-web
  template:
    metadata:
      labels:
        app: qts
        component: bff-web
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: qts-sa
      containers:
        - name: bff-web
          image: qts/bff-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: NODE_ENV
              value: "development"
            - name: PORT
              value: "8080"
            - name: API_GATEWAY_URL
              value: "http://api-gateway.qts-dev.svc.cluster.local"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bff-web
  namespace: qts-dev
  labels:
    app: qts
    component: bff-web
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: qts
    component: bff-web
