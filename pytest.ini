[pytest]
# pytest configuration for QTS integration tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:cacheprovider

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (require external services)
    e2e: End-to-end tests (full system)
    slow: Tests that take significant time
    smoke: Quick smoke tests

# Coverage options (when using pytest-cov)
# Uncomment when coverage is needed:
# --cov=src
# --cov-report=html
# --cov-report=term-missing
# --cov-report=lcov
# --cov-fail-under=80

# Logging
log_cli = false
log_cli_level = INFO
log_file = tests.log
log_file_level = DEBUG

# Timeout (requires pytest-timeout)
# timeout = 300

# Minimum Python version
minversion = 3.8

# Ignore paths
norecursedirs = .git .tox build dist *.egg-info __pycache__
