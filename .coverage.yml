# Code Coverage Configuration for QTS
# This file configures coverage reporting for all services

coverage:
  precision: 2
  round: down
  range: "80...100"

  status:
    project:
      default:
        target: 80%
        threshold: 1%
    biz-trade:
      target: 80%
      paths:
        - services/biz-trade/src/main/java
    bff-web:
      target: 80%
      paths:
        - services/bff-web/src

comment:
  layout: "header, diff, files, footer"
  behavior: default
  require_changes: false
  header: |
    ## Code Coverage Report
    | Service | Coverage | Status |
    |---------|----------|--------|
  footer: |
    ---
    *Generated by Coverage.py*
  hide_comment_if_empty: true
