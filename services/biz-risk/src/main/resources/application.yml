# Risk Engine Service Configuration
# Following ESD-MANDATORY-001 L2-005: Observability Design

spring:
  application:
    name: biz-risk-engine
  
  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:risk_db}
    username: ${POSTGRES_USER:risk_user}
    password: ${POSTGRES_PASSWORD:risk_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
  
  # Redis Configuration
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 2
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 60000 # 60 seconds TTL

# Server Configuration
server:
  port: ${SERVER_PORT:8081}

# gRPC Server Configuration
grpc:
  server:
    port: ${GRPC_PORT:50051}

# Rule Engine Configuration
qts:
  risk:
    engine:
      # Default timeout for rule evaluation in milliseconds
      timeout-ms: 5000
      # Default logic operator for rule chain (AND/OR)
      default-chain-operator: AND
      # Enable/disable default preset rules when DB is empty
      load-default-rules: true

# Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: audit-log-consumer-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: com.qts.biz.risk.audit.dto

# Audit Log Configuration
audit:
  kafka:
    topic: audit-log
    batch-size: 100
    flush-interval-ms: 5000
  retention:
    years: 5

# Logging Configuration
logging:
  level:
    root: INFO
    com.qts.biz.risk.engine: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-}] %-5level %logger{36} - %msg%n"
